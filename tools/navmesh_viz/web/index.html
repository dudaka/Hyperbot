<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navmesh Visualization</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e14; }
      #app { position: fixed; inset: 0; }
      #hud {
        position: fixed; top: 12px; left: 12px; max-width: 320px;
        font: 13px/1.5 ui-monospace, Menlo, monospace; color: #d7dde8;
        background: rgba(16, 20, 28, 0.82); padding: 12px 14px; border-radius: 8px;
        border: 1px solid #2a3342;
      }
      #hud b { color: #7fd1ff; }
      #hud .s { color: #5fe08a; }
      #hud .g { color: #ff7b7b; }
      #hud button {
        margin-top: 8px; font: inherit; color: #d7dde8; background: #1b2330;
        border: 1px solid #38445a; border-radius: 6px; padding: 4px 10px; cursor: pointer;
      }
      #hud button:hover { background: #232d3d; }
      #hud button:disabled { opacity: 0.4; cursor: not-allowed; }
      #scope { margin-top: 10px; display: flex; gap: 6px; }
      #scope button.active { background: #2d6cff; border-color: #2d6cff; color: #fff; }
      #status { margin-top: 8px; color: #9aa6b8; }
      #log {
        margin-top: 8px; max-height: 40vh; overflow-y: auto;
        border-top: 1px solid #2a3342; padding-top: 8px;
        font-size: 12px; white-space: pre-wrap; word-break: break-all;
      }
      #log .entry { margin-bottom: 6px; color: #b6c0d0; }
      #log .pick { color: #7fd1ff; }
      #log .req { color: #ffe14d; }
      #log .res-ok { color: #5fe08a; }
      #log .res-err { color: #ff7b7b; }
      #compass {
        position: fixed; top: 12px; right: 12px; width: 96px; height: 96px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <canvas id="compass"></canvas>
    <div id="hud">
      <div><b>Navmesh Visualization</b></div>
      <div>Drag to orbit, scroll to zoom.</div>
      <div>Click to set <span class="s">S</span>, click again for
        <span class="g">G</span>. The clicked surface height picks the layer.</div>
      <div>Region scope:</div>
      <div id="scope">
        <button data-radius="0">1x1</button>
        <button data-radius="1">3x3</button>
        <button data-radius="2">5x5</button>
      </div>
      <div id="status">Loading geometry...</div>
      <button id="reset">Reset S/G</button>
      <button id="clearLog">Clear log</button>
      <label id="stitchToggle" style="display:block; margin-top:10px;">
        <input type="checkbox" id="showStitch" /> Stitch edges
        <span style="color:#00e5ff">0x00</span><span class="s">(terrain)</span>
        / <span style="color:#ff6ad5">0x08</span><span class="s">(object)</span>
      </label>
      <div id="log"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
